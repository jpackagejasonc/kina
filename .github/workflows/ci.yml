name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci-and-build:
    strategy:
      matrix:
        runner: [macos-26]
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-mise

      - name: Cache Rust toolchain
        if: ${{ !env.ACT }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.cargo/registry
            ~/.cargo/git
            kina-cli/target
          key: rust-${{ matrix.runner }}-${{ hashFiles('kina-cli/Cargo.lock') }}
          restore-keys: |
            rust-${{ matrix.runner }}-

      - name: Install tools
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mise trust --all

      - name: Install kubectl
        if: ${{ !env.ACT }}
        env:
          KUBECTL_VERSION: v1.35.5
        run: |
          curl -sLO --retry 3 --retry-all-errors "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/darwin/arm64/kubectl"
          curl -sLO --retry 3 --retry-all-errors "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/darwin/arm64/kubectl.sha256"
          sha256 -c $(cat kubectl.sha256) kubectl
          rm -f kubectl.sha256
          chmod 0755 kubectl
          sudo mv kubectl /usr/local/bin

      - name: Install Apple container package
        if: ${{ !env.ACT }}
        env:
          CONTAINER_SHA256: 83f363126ac1f064588de39cd6b474340d489c1926492a2c4e59c4d54aa6d8e3
          CONTAINER_VERSION: 0.12.3
        run: |
          curl -sLO --retry 3 --retry-all-errors "https://github.com/apple/container/releases/download/${CONTAINER_VERSION}/container-${CONTAINER_VERSION}-installer-signed.pkg"
          sha256 -c $CONTAINER_SHA256 container-${CONTAINER_VERSION}-installer-signed.pkg
          sudo installer -pkg container-${CONTAINER_VERSION}-installer-signed.pkg -target /
          rm -f container-${CONTAINER_VERSION}-installer-signed.pkg
        working-directory: /tmp

      - name: Start Apple container and install default kernel
        if: ${{ !env.ACT }}
        run: container system start --enable-kernel-install

      - name: Run ci (check formatting, run clippy/lint, and test)
        run: mise run ci

      - name: Build
        run: mise run build

      - name: Stop Apple container
        if: ${{ !env.ACT }}
        run: container system stop
