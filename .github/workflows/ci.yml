name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci-and-build:
    strategy:
      matrix:
        runner: [macos-26]
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-mise

      - name: Cache Rust toolchain
        if: ${{ !env.ACT }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.cargo/registry
            ~/.cargo/git
            kina-cli/target
          key: rust-${{ matrix.runner }}-${{ hashFiles('kina-cli/Cargo.lock') }}
          restore-keys: |
            rust-${{ matrix.runner }}-

      - name: Install tools
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mise trust --all
          mise install

      - name: Install Apple container package
        if: ${{ !env.ACT }}
        env:
          CONTAINER_VERSION: 0.12.3
        run: |
          curl -sLO --retry 3 --retry-all-errors https://github.com/apple/container/releases/download/${CONTAINER_VERSION}/container-${CONTAINER_VERSION}-installer-signed.pkg
          sudo installer -pkg container-${CONTAINER_VERSION}-installer-signed.pkg -target /
          rm -f container-${CONTAINER_VERSION}-installer-signed.pkg
        working-directory: /tmp

      - name: Run ci (check formatting, run clippy/lint, and test)
        run: mise run ci

      - name: Build
        run: mise run build
