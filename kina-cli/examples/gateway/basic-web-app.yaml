# Basic Web Application with Gateway API + Traefik
#
# Demonstrates:
# - Simple web app deployment
# - Service to expose the app
# - HTTPRoute attached to the shared `traefik` Gateway in the `traefik` namespace
#
# Deploy with: kubectl apply -f basic-web-app.yaml
# Test with:   curl -H "Host: myapp.local" http://<cluster-ip>

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: basic-web-app
  namespace: default
  labels:
    app: basic-web-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: basic-web-app
  template:
    metadata:
      labels:
        app: basic-web-app
    spec:
      containers:
      - name: web
        image: joseluisq/static-web-server:2.42.0
        ports:
        - containerPort: 80
        env:
        - name: SERVER_ROOT
          value: /public
        - name: SERVER_PORT
          value: "80"
        volumeMounts:
        - name: html-content
          mountPath: /public
          readOnly: true
      volumes:
      - name: html-content
        configMap:
          name: web-content

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-content
  namespace: default
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <title>Basic Web App</title>
        <style>
            body { font-family: Arial, sans-serif; margin: 40px; }
            .container { max-width: 600px; margin: 0 auto; text-align: center; }
            .header { color: #2c3e50; margin-bottom: 30px; }
            .info { background: #ecf0f1; padding: 20px; border-radius: 8px; }
        </style>
    </head>
    <body>
        <div class="container">
            <h1 class="header">🎉 Basic Web App</h1>
            <div class="info">
                <p>Congratulations! Your basic web application is running successfully.</p>
                <p><strong>Deployment:</strong> basic-web-app</p>
                <p><strong>Replicas:</strong> 2</p>
                <p><strong>Host:</strong> myapp.local</p>
            </div>
        </div>
    </body>
    </html>

---
apiVersion: v1
kind: Service
metadata:
  name: basic-web-app-service
  namespace: default
  labels:
    app: basic-web-app
spec:
  selector:
    app: basic-web-app
  ports:
  - name: http
    port: 80
    targetPort: 80
  type: ClusterIP

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: basic-web-app-route
  namespace: default
spec:
  parentRefs:
  - name: traefik
    namespace: traefik
    sectionName: web
  hostnames:
  - myapp.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: basic-web-app-service
      port: 80
