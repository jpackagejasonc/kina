# Multi-Service Application with Path-Based Routing (Gateway API)
#
# Demonstrates:
# - Multiple services behind a single HTTPRoute
# - Path-based routing (/app, /api, /admin) with URLRewrite filters
#
# Deploy with: kubectl apply -f multi-service-routing.yaml
# Test with:
#   curl -H "Host: platform.local" http://<cluster-ip>/app
#   curl -H "Host: platform.local" http://<cluster-ip>/api
#   curl -H "Host: platform.local" http://<cluster-ip>/admin

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-app
  template:
    metadata:
      labels:
        app: frontend-app
    spec:
      containers:
      - name: web
        image: joseluisq/static-web-server:2.42.0@sha256:905174e536be8751f0268ff18b7b0921c17685b15537c069f13aff92bd8bf336
        ports:
        - containerPort: 80
        env:
        - name: SERVER_ROOT
          value: /public
        - name: SERVER_PORT
          value: "80"
        volumeMounts:
        - name: frontend-content
          mountPath: /public
          readOnly: true
      volumes:
      - name: frontend-content
        configMap:
          name: frontend-content

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-content
  namespace: default
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head><title>Frontend App</title></head>
    <body>
        <h1>🎨 Frontend Application</h1>
        <p>This is the main application frontend.</p>
        <p>Path: /app</p>
    </body>
    </html>

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: default
spec:
  selector:
    app: frontend-app
  ports:
  - port: 80
    targetPort: 80

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-backend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-backend
  template:
    metadata:
      labels:
        app: api-backend
    spec:
      containers:
      - name: web
        image: joseluisq/static-web-server:2.42.0@sha256:905174e536be8751f0268ff18b7b0921c17685b15537c069f13aff92bd8bf336
        ports:
        - containerPort: 80
        env:
        - name: SERVER_ROOT
          value: /public
        - name: SERVER_PORT
          value: "80"
        volumeMounts:
        - name: api-content
          mountPath: /public
          readOnly: true
      volumes:
      - name: api-content
        configMap:
          name: api-content

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-content
  namespace: default
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head><title>API Backend</title></head>
    <body>
        <h1>🔧 API Backend</h1>
        <p>This is the API service backend.</p>
        <p>Path: /api</p>
    </body>
    </html>

---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: default
spec:
  selector:
    app: api-backend
  ports:
  - port: 80
    targetPort: 80

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-interface
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-interface
  template:
    metadata:
      labels:
        app: admin-interface
    spec:
      containers:
      - name: web
        image: joseluisq/static-web-server:2.42.0@sha256:905174e536be8751f0268ff18b7b0921c17685b15537c069f13aff92bd8bf336
        ports:
        - containerPort: 80
        env:
        - name: SERVER_ROOT
          value: /public
        - name: SERVER_PORT
          value: "80"
        volumeMounts:
        - name: admin-content
          mountPath: /public
          readOnly: true
      volumes:
      - name: admin-content
        configMap:
          name: admin-content

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: admin-content
  namespace: default
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head><title>Admin Interface</title></head>
    <body style="background: #f8f9fa; font-family: Arial;">
        <h1>⚙️ Admin Interface</h1>
        <p>This is the administration interface.</p>
        <p>Path: /admin</p>
    </body>
    </html>

---
apiVersion: v1
kind: Service
metadata:
  name: admin-service
  namespace: default
spec:
  selector:
    app: admin-interface
  ports:
  - port: 80
    targetPort: 80

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: platform-route
  namespace: default
spec:
  parentRefs:
  - name: traefik
    namespace: traefik
    sectionName: web
  hostnames:
  - platform.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /app
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: frontend-service
      port: 80
  - matches:
    - path:
        type: PathPrefix
        value: /api
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: api-service
      port: 80
  - matches:
    - path:
        type: PathPrefix
        value: /admin
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: admin-service
      port: 80
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: frontend-service
      port: 80
