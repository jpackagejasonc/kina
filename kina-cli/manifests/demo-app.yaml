---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kina-demo-app
  namespace: default
  labels:
    app: kina-demo-app
spec:
  replicas: 4
  selector:
    matchLabels:
      app: kina-demo-app
  template:
    metadata:
      labels:
        app: kina-demo-app
    spec:
      initContainers:
      - name: render-template
        image: alpine:3.23.4@sha256:378c4c5418f7493bd500ad21ffb43818d0689daaad43e3261859fb417d1481a0
        command: ["/bin/sh", "-c"]
        args:
          - |
            apk update;
            apk add --no-cache gettext-envsubst;
            envsubst '$MY_POD_NAME $MY_POD_IP $MY_NODE_NAME' < /templates/index.html > /rendered/index.html
        env:
        - name: MY_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: MY_POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: MY_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        volumeMounts:
        - name: demo-template
          mountPath: /templates
          readOnly: true
        - name: rendered
          mountPath: /rendered
      containers:
      - name: web
        image: joseluisq/static-web-server:2.42.0@sha256:905174e536be8751f0268ff18b7b0921c17685b15537c069f13aff92bd8bf336
        ports:
        - containerPort: 80
        env:
        - name: SERVER_ROOT
          value: /public
        - name: SERVER_PORT
          value: "80"
        resources:
          requests:
            cpu: "50m"
            memory: "32Mi"
        volumeMounts:
        - name: rendered
          mountPath: /public
          readOnly: true
      volumes:
      - name: demo-template
        configMap:
          name: kina-demo-content
      - name: rendered
        emptyDir: {}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kina-demo-content
  namespace: default
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Kina Demo Success!</title>
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .container {
                background: white;
                padding: 40px;
                border-radius: 20px;
                box-shadow: 0 20px 40px rgba(0,0,0,0.1);
                text-align: center;
                max-width: 600px;
                margin: 20px;
            }
            .header {
                color: #2c3e50;
                margin-bottom: 30px;
                font-size: 2.5rem;
                font-weight: 300;
            }
            .success-badge {
                display: inline-block;
                background: #2ecc71;
                color: white;
                padding: 8px 16px;
                border-radius: 20px;
                font-size: 0.9rem;
                margin-bottom: 20px;
                font-weight: 500;
            }
            .info-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
                margin: 30px 0;
            }
            .info-card {
                background: #f8f9fa;
                padding: 20px;
                border-radius: 10px;
                border-left: 4px solid #3498db;
            }
            .info-label {
                font-weight: 600;
                color: #34495e;
                margin-bottom: 5px;
                text-transform: uppercase;
                font-size: 0.8rem;
                letter-spacing: 1px;
            }
            .info-value {
                font-size: 1.1rem;
                color: #2c3e50;
                font-family: 'Monaco', 'Menlo', monospace;
            }
            .pod-info {
                background: #eaf2fd;
                border: 1px solid #3498db;
                border-radius: 8px;
                padding: 15px;
                margin: 20px 0;
            }
            .pod-info .info-grid {
                margin: 10px 0 0 0;
            }
            .features {
                text-align: left;
                margin: 30px 0;
            }
            .feature {
                display: flex;
                align-items: center;
                margin: 10px 0;
                padding: 10px;
                background: #ecf0f1;
                border-radius: 8px;
            }
            .feature-icon {
                margin-right: 15px;
                font-size: 1.2rem;
            }
            .footer {
                margin-top: 30px;
                padding-top: 20px;
                border-top: 1px solid #ecf0f1;
                color: #7f8c8d;
                font-size: 0.9rem;
            }
            .cluster-info {
                background: #e8f5e8;
                border: 1px solid #2ecc71;
                border-radius: 8px;
                padding: 15px;
                margin: 20px 0;
            }
            @media (max-width: 600px) {
                .info-grid { grid-template-columns: 1fr; }
                .container { padding: 20px; margin: 10px; }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="success-badge">&#x2705; DEPLOYMENT SUCCESSFUL</div>
            <h1 class="header">&#x1F389; Kina Demo Cluster</h1>

            <div class="cluster-info">
                <div class="info-label">Cluster Name</div>
                <div class="info-value">${CLUSTER_NAME}</div>
            </div>

            <div class="pod-info">
                <div class="info-label">Served By</div>
                <div class="info-grid">
                    <div class="info-card">
                        <div class="info-label">Pod Name</div>
                        <div class="info-value">${MY_POD_NAME}</div>
                    </div>
                    <div class="info-card">
                        <div class="info-label">Pod IP</div>
                        <div class="info-value">${MY_POD_IP}</div>
                    </div>
                    <div class="info-card">
                        <div class="info-label">Node</div>
                        <div class="info-value">${MY_NODE_NAME}</div>
                    </div>
                    <div class="info-card">
                        <div class="info-label">Gateway</div>
                        <div class="info-value">traefik</div>
                    </div>
                </div>
            </div>

            <div class="info-grid">
                <div class="info-card">
                    <div class="info-label">Platform</div>
                    <div class="info-value">Apple Container</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Replicas</div>
                    <div class="info-value">4 pods</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Domain</div>
                    <div class="info-value">${CLUSTER_NAME}-control-plane.${DNS_DOMAIN}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Load Balanced</div>
                    <div class="info-value">Yes (refresh to see)</div>
                </div>
            </div>

            <div class="features">
                <div class="feature">
                    <span class="feature-icon">&#x1F3D7;&#xFE0F;</span>
                    <span>Kubernetes cluster running on Apple Container</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">&#x1F310;</span>
                    <span>Traefik gateway controller (Gateway API) installed</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">&#x1F4E6;</span>
                    <span>Demo application with 4 replicas deployed</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">&#x1F517;</span>
                    <span>HTTPRoute configured and working</span>
                </div>
            </div>

            <div class="footer">
                <strong>&#x1F680; Ready for development!</strong><br>
                Your Kina cluster is fully configured and ready to use.
                <br><br>
                <em>Generated by: mise run test:cluster</em>
            </div>
        </div>
    </body>
    </html>

---
apiVersion: v1
kind: Service
metadata:
  name: kina-demo-service
  namespace: default
  labels:
    app: kina-demo-app
spec:
  selector:
    app: kina-demo-app
  ports:
  - name: http
    port: 80
    targetPort: 80
  type: ClusterIP

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kina-demo-route
  namespace: default
spec:
  parentRefs:
  - name: traefik
    namespace: traefik
    sectionName: web
  hostnames:
  - ${CLUSTER_NAME}-control-plane.${DNS_DOMAIN}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: kina-demo-service
      port: 80
