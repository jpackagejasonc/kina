kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: traefik
rules:
- apiGroups: [""]
  resources:
  - services
  - endpoints
  - secrets
  - namespaces
  - nodes
  - configmaps
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources:
  - events
  verbs: ["create", "patch", "update"]
- apiGroups: ["discovery.k8s.io"]
  resources:
  - endpointslices
  verbs: ["get", "list", "watch"]
- apiGroups: ["gateway.networking.k8s.io"]
  resources:
  - gatewayclasses
  - gateways
  - httproutes
  - referencegrants
  - grpcroutes
  - tcproutes
  - tlsroutes
  - udproutes
  - backendtlspolicies
  verbs: ["get", "list", "watch"]
- apiGroups: ["gateway.networking.k8s.io"]
  resources:
  - gatewayclasses/status
  - gateways/status
  - httproutes/status
  - grpcroutes/status
  - tcproutes/status
  - tlsroutes/status
  - udproutes/status
  verbs: ["update", "patch"]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: traefik
subjects:
- kind: ServiceAccount
  name: traefik
  namespace: traefik
roleRef:
  kind: ClusterRole
  name: traefik
  apiGroup: rbac.authorization.k8s.io
